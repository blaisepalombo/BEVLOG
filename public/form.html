<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Drink | Energy Drink Tracker</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="/dashboard">Energy Drink Tracker</a>
      <nav class="nav-actions">
        <a class="btn btn-secondary" href="/dashboard">Back to Dashboard</a>
      </nav>
    </div>
  </header>

  <main class="container page-content">
    <section class="panel form-panel">
      <p class="eyebrow">Drink Form</p>
      <h1 id="formTitle">Add Drink</h1>
      <p class="muted" id="formSubtitle">Create a new drink entry.</p>

      <p id="formMessage" class="message" hidden></p>

      <form id="drinkForm" class="drink-form">
        <div class="field">
          <label for="brand">Brand</label>
          <input id="brand" name="brand" type="text" required />
        </div>

        <div class="field">
          <label for="drinkName">Drink Name</label>
          <input id="drinkName" name="drinkName" type="text" required />
        </div>

        <div class="field">
          <label for="sizeOz">Size (oz)</label>
          <input id="sizeOz" name="sizeOz" type="number" min="1" step="0.1" required />
        </div>

        <div class="field">
          <label for="caffeineMg">Caffeine (mg)</label>
          <input id="caffeineMg" name="caffeineMg" type="number" min="0" step="1" />
        </div>

        <div class="field">
          <label for="sugarG">Sugar (g)</label>
          <input id="sugarG" name="sugarG" type="number" min="0" step="1" />
        </div>

        <div class="field">
          <label for="rating">Rating (1-10)</label>
          <input id="rating" name="rating" type="number" min="1" max="10" step="1" />
        </div>

        <div class="field field-full">
          <label for="purchasedAt">Purchased At</label>
          <input id="purchasedAt" name="purchasedAt" type="datetime-local" />
        </div>

        <div class="field field-full">
          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" rows="5"></textarea>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary" type="submit" id="submitButton">Save Drink</button>
          <a class="btn btn-secondary" href="/dashboard">Cancel</a>
        </div>
      </form>
    </section>
  </main>

  <script type="module" src="/js/form.js"></script>
</body>
</html>
